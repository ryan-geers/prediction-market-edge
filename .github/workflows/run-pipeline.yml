name: Run Pipeline

on:
  workflow_dispatch:
  schedule:
    # UTC-only (GitHub). Anchored to America/Chicago during daylight (CDT): 00:00 / 06:00 / 12:00 / 18:00 local.
    # In standard time (CST) the same UTC instants fall ~07:00 / 13:00 / 19:00 / ~01:00 local (one-hour shift).
    - cron: "0 5,11,17,23 * * *"

# Shared pipeline logic with local: `pme run` then report helpers; artifacts restore/persist state on ephemeral runners.
jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
      BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
      KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
      KALSHI_KEY_ID: ${{ secrets.KALSHI_KEY_ID }}
      SAVE_RUN_ARTIFACTS: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Restore prior data
        uses: actions/cache@v4
        with:
          path: |
            data/pme.duckdb
            data/reports
          key: pme-state-${{ github.run_id }}
          restore-keys: |
            pme-state-

      - name: Consolidate duplicate positions
        run: |
          pme consolidate-positions

      - name: Run pipeline
        run: |
          pme run --thesis economic_indicators

      - name: Generate weekly digest snapshot
        run: |
          pme weekly-digest --output data/reports/weekly_digest_latest.md

      - name: Paper trading report
        run: |
          pme paper-report --output data/reports/paper_trading_latest.md

      - name: Prune old run_report archives
        run: pme prune-reports --dir data/reports --keep 48

      - name: Save state to cache
        uses: actions/cache/save@v4
        with:
          path: |
            data/pme.duckdb
            data/reports
          key: pme-state-${{ github.run_id }}

      # Rolling DB snapshot — always reflects the most recent completed pipeline run.
      # Overwrites the previous copy so only one artifact slot is consumed.
      # Recovery: download this artifact and place pme.duckdb at data/pme.duckdb
      # before triggering the next pipeline run to restore accumulated history.
      - name: Upload rolling DB snapshot
        uses: actions/upload-artifact@v4
        with:
          name: pme-db-latest
          path: data/pme.duckdb
          if-no-files-found: warn
          overwrite: true
          retention-days: 90

      - name: Write run summary
        run: |
          {
            echo "## Prediction Market Edge Run"
            ls -la data/reports
            if [ -f data/reports/weekly_digest_latest.md ]; then
              head -n 40 data/reports/weekly_digest_latest.md
            fi
          } >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
