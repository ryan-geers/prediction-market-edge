name: Weekly Summary Email

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Do not send SMTP; still writes reports and uploads artifacts
        type: boolean
        default: false
      skip_freshness_check:
        description: Bypass pme check-state (allow digest if DB missing or stale — not recommended)
        type: boolean
        default: false
  schedule:
    # UTC-only (GitHub). Day 6 = Saturday. 13:00 UTC ≈ 08:00 America/Chicago in CDT; ≈ 07:00 in CST.
    - cron: "0 13 * * 6"

# Produces Markdown + HTML digests, uploads artifacts, and optionally emails the Markdown body.
# Dry-run: manual workflow_dispatch, or repo variable PME_EMAIL_DRY_RUN=true.
# Freshness: fails before digest if data/pme.duckdb is missing, run_manifest empty, or last run >7d old.
# Skip gate: manual skip_freshness_check, or repo variable PME_SKIP_WEEKLY_FRESHNESS_CHECK=true.
jobs:
  email-weekly-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: dry_flags
        env:
          REPO_VAR: ${{ vars.PME_EMAIL_DRY_RUN }}
          IN_DRY: ${{ github.event.inputs.dry_run }}
        run: |
          DRY="false"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${IN_DRY}" = "true" ]; then
            DRY="true"
          fi
          if [ "${REPO_VAR}" = "true" ]; then
            DRY="true"
          fi
          echo "dry_run=${DRY}" >> "${GITHUB_OUTPUT}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Restore latest pipeline state
        uses: actions/cache/restore@v4
        with:
          path: |
            data/pme.duckdb
            data/reports
          key: pme-state-latest
          restore-keys: |
            pme-state-

      - name: Require fresh pipeline state
        env:
          SKIP_VAR: ${{ vars.PME_SKIP_WEEKLY_FRESHNESS_CHECK || '' }}
        run: |
          set -euo pipefail
          SKIP_IN="false"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            SKIP_IN="$(jq -r '.inputs.skip_freshness_check // false' "${GITHUB_EVENT_PATH}")"
          fi
          if [ "${SKIP_IN}" = "true" ] || [ "${SKIP_VAR}" = "true" ]; then
            echo "Skipping freshness gate (manual input or PME_SKIP_WEEKLY_FRESHNESS_CHECK)."
            exit 0
          fi
          pme check-state --max-run-age-days 7

      - name: Generate weekly digest (Markdown + HTML)
        run: |
          mkdir -p data/reports
          pme weekly-digest --output data/reports/weekly_digest.md --html-output data/reports/weekly_digest.html

      - name: Append workflow link to Markdown (for email body)
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          srv = os.environ.get("GITHUB_SERVER_URL", "")
          repo = os.environ.get("GITHUB_REPOSITORY", "")
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          run_url = f"{srv}/{repo}/actions/runs/{run_id}" if srv and repo and run_id else "(local or unknown)"
          p = Path("data/reports/weekly_digest.md")
          foot = f"\n\n---\n**Audit:** Full HTML digest is in workflow artifact `pme-weekly-digest` (`weekly_digest.html`).\n**This run:** {run_url}\n"
          p.write_text(p.read_text(encoding="utf-8") + foot, encoding="utf-8")
          PY

      - name: Upload digest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pme-weekly-digest
          path: |
            data/reports/weekly_digest.md
            data/reports/weekly_digest.html
          if-no-files-found: warn

      # Weekly point-in-time DB snapshot — permanent backup independent of the cache.
      # If the cache is ever lost, download this artifact and place it at data/pme.duckdb
      # before the next pipeline run to restore accumulated history.
      - name: Upload DB snapshot
        uses: actions/upload-artifact@v4
        with:
          name: pme-db-weekly-${{ github.run_id }}
          path: data/pme.duckdb
          if-no-files-found: warn
          retention-days: 90

      - name: Send SMTP email
        if: steps.dry_flags.outputs.dry_run != 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          pme send-weekly-email --markdown-file data/reports/weekly_digest.md

      - name: Dry-run (no SMTP)
        if: steps.dry_flags.outputs.dry_run == 'true'
        run: |
          pme send-weekly-email --markdown-file data/reports/weekly_digest.md --dry-run
          echo "Dry-run: SMTP skipped. See artifact pme-weekly-digest."

      - name: Job summary
        run: |
          echo "## Weekly digest" >> "$GITHUB_STEP_SUMMARY"
          echo "Dry-run: \`${{ steps.dry_flags.outputs.dry_run }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          head -n 50 data/reports/weekly_digest.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifacts: \`pme-weekly-digest\` (Markdown + HTML)." >> "$GITHUB_STEP_SUMMARY"
